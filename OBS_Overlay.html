<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <style>
        :root { --main-color: #ff00ff; }
        body { background: transparent; font-family: sans-serif; color: white; overflow: hidden; width: 1920px; height: 1080px; margin: 0; }
        #notification { position: absolute; top: 40px; left: 50%; transform: translateX(-50%) translateY(-100px); background: rgba(0,0,0,0.85); padding: 15px 60px; border-radius: 50px; border: 2px solid var(--main-color); font-size: 28px; font-weight: bold; transition: 0.6s; opacity: 0; white-space: nowrap; }
        #notification.show { transform: translateX(-50%) translateY(0); opacity: 1; }
        #now-singing { position: absolute; bottom: 80px; left: 80px; background: rgba(0,0,0,0.8); padding: 20px 40px; border-left: 10px solid var(--main-color); border-radius: 0 15px 15px 0; transition: 0.5s; opacity: 0; transform: translateX(-50px); }
        #now-singing.show { opacity: 1; transform: translateX(0); }
    </style>
</head>
<body>
    <div id="notification"><span id="user-name-notif" style="color:var(--main-color);"></span> さんからリクエスト！</div>
    <div id="now-singing">
        <div style="font-size: 18px; color: var(--main-color); font-weight: bold;">NOW SINGING</div>
        <div id="song-title" style="font-size: 48px; font-weight: bold;">-</div>
        <div id="artist-name" style="font-size: 24px; color: #ccc;">-</div>
    </div>
<script type="module">
    import { firebaseConfig } from "./config.js";
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
    import { getDatabase, ref, onValue, onChildAdded } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-database.js";

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    onValue(ref(db, 'currentSinging'), (s) => {
        const d = s.val();
        if (d) {
            document.getElementById('song-title').innerText = d.title;
            document.getElementById('artist-name').innerText = d.artist;
            document.getElementById('now-singing').classList.add('show');
        } else {
            document.getElementById('now-singing').classList.remove('show');
        }
    });

    let isFirstLoad = true;
    onChildAdded(ref(db, 'queue'), (snap) => {
        if (isFirstLoad) return;
        const data = snap.val();
        const notif = document.getElementById('notification');
        document.getElementById('user-name-notif').innerText = data.user;
        notif.classList.add('show');
        setTimeout(() => notif.classList.remove('show'), 6000);
    });
    setTimeout(() => { isFirstLoad = false; }, 2000);
</script>
</body>
</html>
